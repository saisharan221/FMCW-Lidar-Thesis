# Full v1 PTv3 config — spec §5.2.
# Targets the spec's A100 40GB. For RTX 5080 16GB use ptv3_5080.yaml,
# which keeps the same architecture but reduces batch + adds grad accum.

data:
  root: ${oc.env:AEVASCENES_ROOT, data/aevascenes_v0.2}
  splits_file: code/configs/splits.json
  lidar: front_wide_lidar
  grid_size: 0.1
  num_workers: 8

model:
  in_channels: 5
  head_hidden: 64
  head_dropout: 0.0
  enable_flash: true

optim:
  lr_peak: 0.002
  weight_decay: 0.005
  grad_clip: 1.0
  pct_start: 0.05
  optimizer: adamw
  scheduler: onecycle

trainer:
  epochs: 50
  batch_size: 4
  grad_accum: 1
  precision: bf16
  seed: 42
  val_every_epochs: 1
  save_every_epochs: 1

loss:
  huber_beta: 0.5
  w_dyn: 1.0
  w_bg: 0.2
  dynamic_threshold: 0.5

wandb:
  enabled: true
  project: ptv3-fmcw
  tags: [full, v1]

output_dir: checkpoints
