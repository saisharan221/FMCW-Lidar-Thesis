# RTX 5080 (16 GB) budget config.
# Spec §3.2 was sized for A100 40GB at batch 4. With 16 GB Blackwell
# we keep the architecture identical (so the methodology claim "PTv3
# on FMCW" stands) and shrink the per-step batch:
#   - batch_size 1 + grad_accum 4 -> effective batch 4 (matches spec)
#   - flash-attn stays on (Blackwell + recent flash-attn build)
#   - precision bf16 (Blackwell native)
# Wall-clock estimate: ~2-3x the A100 7h budget, so plan ~14-20h per
# full run.

data:
  root: ${oc.env:AEVASCENES_ROOT, data/aevascenes_v0.2}
  splits_file: code/configs/splits.json
  lidar: front_wide_lidar
  grid_size: 0.1
  num_workers: 6

model:
  in_channels: 5
  head_hidden: 64
  head_dropout: 0.0
  enable_flash: true

optim:
  lr_peak: 0.002
  weight_decay: 0.005
  grad_clip: 1.0
  pct_start: 0.05
  optimizer: adamw
  scheduler: onecycle

trainer:
  epochs: 50
  batch_size: 1
  grad_accum: 4
  precision: bf16
  seed: 42
  val_every_epochs: 1
  save_every_epochs: 1

loss:
  huber_beta: 0.5
  w_dyn: 1.0
  w_bg: 0.2
  dynamic_threshold: 0.5

wandb:
  enabled: true
  project: ptv3-fmcw
  tags: [v1, rtx5080]

output_dir: checkpoints
