# Pilot config: 3 sequences, 10 epochs, debug-fast.
# Spec §5.8 row "Pilot debug".

data:
  root: ${oc.env:AEVASCENES_ROOT, data/aevascenes_v0.2}
  splits_file: code/configs/splits.json
  lidar: front_wide_lidar
  grid_size: 0.1
  num_workers: 4
  pilot_sequences: 3

model:
  in_channels: 5
  head_hidden: 64
  head_dropout: 0.0
  enable_flash: true

optim:
  lr_peak: 0.002
  weight_decay: 0.005
  grad_clip: 1.0
  pct_start: 0.05
  optimizer: adamw
  scheduler: onecycle

trainer:
  epochs: 10
  batch_size: 2
  grad_accum: 1
  precision: bf16
  seed: 42
  val_every_epochs: 1
  save_every_epochs: 5

loss:
  huber_beta: 0.5
  w_dyn: 1.0
  w_bg: 0.2
  dynamic_threshold: 0.5

wandb:
  enabled: false
  project: ptv3-fmcw
  tags: [pilot]

output_dir: checkpoints
